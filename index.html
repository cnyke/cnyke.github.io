<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilience Continuum</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica, Arial, sans-serif;
        }

        body {
            padding: 2rem;
            background-color: #ffffff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .title {
            font-family: 'Silkscreen', cursive;
            font-size: 2rem;
            font-weight: bold;

        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #666;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.565rem;
            grid-auto-rows: 1px;
        }

        .project-item {
            grid-row-end: span 30; /* This will be adjusted by JavaScript */
            background-color: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
        }

        .project-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            nav ul {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script>
        // Function to adjust grid row spans based on image heights
        function adjustGridItems() {
            const gridItems = document.querySelectorAll('.project-item');
            gridItems.forEach(item => {
                const height = item.querySelector('img').height;
                const rowSpan = Math.ceil(height / 10); // 10px is our grid-auto-rows value
                item.style.gridRowEnd = `span ${rowSpan}`;
            });
        }

        // Run on load and when images are loaded
        window.addEventListener('load', adjustGridItems);
        window.addEventListener('resize', adjustGridItems);
    </script>
</head>
<body>
    <header>

                <li><a href="fiction.html">Fiction</a></li>
                <li><a href="nonfiction.html">Nonfiction</a></li>
                <li><a href="poems.html">Poems</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="projects-grid">
            <!-- Project items will be added here -->
            <div class="project-item">
                <a href="DesignIllustration/gene-editing.html">
                    <img src="Images/geneEditing1.png" alt="Project 1">
                </a>
            </div>
            <div class="project-item">
                <a href="DesignIllustration/skull-and-flies.html">
                    <img src="Images/skullandflies.jpg" alt="Project 2">
                </a>
            </div>
            <div class="project-item">
                <a href="DesignIllustration/phr.html">
                    <img src="Images/PHRsmaller.png" alt="Project 3">
                </a>
            </div>
            <div class="project-item">
                <a href="DesignIllustration/marine-life.html">
                    <img src="Images/whale.jpg" alt="Project 4">
                </a>
            </div>

-->

    </main>
